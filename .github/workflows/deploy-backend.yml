name: Deploy Backend To ECS

on:
  push:
    branches:
      - deployment
    paths:
      - 'backend/**'
      - 'dominos_pakistan_menu_import.json'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

  deploy:
    name: Deploy backend
    needs: validate
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: backend-staging-deployment
      cancel-in-progress: false
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: 352306494518.dkr.ecr.us-east-1.amazonaws.com
      ECR_REPOSITORY: fyp-dev-backend
      ECS_CLUSTER: fyp-dev-backend
      ECS_SERVICE: fyp-dev-backend
      ECS_CONTAINER_NAME: backend
      HEALTH_URL: https://vogwq90ly8.execute-api.us-east-1.amazonaws.com/health
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.BACKEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: backend-deploy-${{ github.run_id }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: image
        env:
          IMAGE_URI: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          docker build --platform linux/amd64 -t "$IMAGE_URI" backend
          docker push "$IMAGE_URI"
          echo "image-uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Capture current ECS task definition
        id: current-task
        run: |
          set -euo pipefail
          current_task_definition_arn="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)"
          if [ -z "$current_task_definition_arn" ] || [ "$current_task_definition_arn" = "None" ]; then
            echo "Could not read current task definition from ECS service." >&2
            exit 1
          fi
          aws ecs describe-task-definition \
            --task-definition "$current_task_definition_arn" \
            --query 'taskDefinition' \
            --output json > current-task-definition.json
          echo "previous-task-definition-arn=$current_task_definition_arn" >> "$GITHUB_OUTPUT"

      - name: Render backend task definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: current-task-definition.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ steps.image.outputs.image-uri }}

      - name: Deploy backend task definition
        id: deploy-task
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-max-delay-seconds: 15

      - name: Verify ECS service revision
        id: ecs-verify
        run: |
          set -euo pipefail
          service_json="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --output json)"
          current_task_definition_arn="$(echo "$service_json" | jq -r '.services[0].taskDefinition')"
          desired_count="$(echo "$service_json" | jq -r '.services[0].desiredCount')"
          running_count="$(echo "$service_json" | jq -r '.services[0].runningCount')"
          new_task_definition_arn="${{ steps.deploy-task.outputs.task-definition-arn }}"
          if [ "$current_task_definition_arn" != "$new_task_definition_arn" ]; then
            echo "Service task definition mismatch." >&2
            echo "Expected: $new_task_definition_arn" >&2
            echo "Actual:   $current_task_definition_arn" >&2
            exit 1
          fi
          if [ "$desired_count" != "$running_count" ]; then
            echo "ECS desired count does not equal running count." >&2
            echo "Desired: $desired_count" >&2
            echo "Running: $running_count" >&2
            exit 1
          fi
          echo "new-task-definition-arn=$new_task_definition_arn" >> "$GITHUB_OUTPUT"
          echo "desired-count=$desired_count" >> "$GITHUB_OUTPUT"
          echo "running-count=$running_count" >> "$GITHUB_OUTPUT"

      - name: Verify public health endpoint
        id: health
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            if response="$(curl --fail --silent --show-error "$HEALTH_URL")"; then
              echo "Health check succeeded on attempt $attempt."
              echo "health-result=success" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after retries." >&2
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].{status:status,desired:desiredCount,running:runningCount,pending:pendingCount,taskDefinition:taskDefinition,deployments:deployments[*].{id:id,status:status,rolloutState:rolloutState,desired:desiredCount,running:runningCount,pending:pendingCount,taskDefinition:taskDefinition},events:events[0:5].[createdAt,message]}' \
            --output json
          echo "health-result=failed" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Write deployment summary
        if: always()
        run: |
          {
            echo "## Backend Deployment Summary"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Git commit SHA | \`${{ github.sha }}\` |"
            echo "| Image URI | \`${{ steps.image.outputs.image-uri }}\` |"
            echo "| Previous task definition | \`${{ steps.current-task.outputs.previous-task-definition-arn }}\` |"
            echo "| New task definition | \`${{ steps.ecs-verify.outputs.new-task-definition-arn || steps.deploy-task.outputs.task-definition-arn }}\` |"
            echo "| ECS cluster | \`${{ env.ECS_CLUSTER }}\` |"
            echo "| ECS service | \`${{ env.ECS_SERVICE }}\` |"
            echo "| Health check | \`${{ steps.health.outputs.health-result || 'not-completed' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
